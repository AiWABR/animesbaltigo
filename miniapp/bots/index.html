<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Universo Baltigo</title>
  <meta name="theme-color" content="#070708" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: #070708;
      --panel: #101114;
      --panel-2: #17181d;
      --line: rgba(255,255,255,.1);
      --line-2: rgba(255,255,255,.18);
      --text: #fff;
      --soft: #d7d8df;
      --muted: #9b9da8;
      --brand: #ff3d34;
      --brand-2: #b81424;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { background: var(--bg); color-scheme: dark; scroll-behavior: smooth; }
    body {
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    button, a { font: inherit; color: inherit; }
    button { border: 0; cursor: pointer; }
    img { display: block; width: 100%; }

    .page {
      width: min(100% - 20px, 680px);
      margin: 0 auto;
      padding: calc(10px + var(--safe-top)) 0 calc(22px + var(--safe-bottom));
    }

    .topbar {
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      position: sticky;
      top: 0;
      z-index: 20;
      padding: 6px 0;
      background: linear-gradient(180deg, rgba(7,7,8,.98), rgba(7,7,8,.82));
      backdrop-filter: blur(14px);
    }

    .language {
      position: relative;
      flex: 0 0 auto;
    }

    .language-button {
      min-height: 34px;
      min-width: 84px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.06);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #f6f6f8;
      font-size: 12px;
      font-weight: 850;
    }

    .language-menu {
      position: absolute;
      right: 0;
      top: calc(100% + 8px);
      width: 180px;
      padding: 6px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(15,15,18,.98);
      box-shadow: 0 20px 54px rgba(0,0,0,.55);
      display: none;
    }

    .language.open .language-menu { display: grid; gap: 4px; }

    .language-menu button {
      min-height: 40px;
      border-radius: 10px;
      background: transparent;
      color: var(--soft);
      text-align: left;
      padding: 0 10px;
      font-size: 13px;
      font-weight: 780;
    }

    .language-menu button.active,
    .language-menu button:hover {
      background: rgba(255,255,255,.08);
      color: #fff;
    }

    .hero {
      position: relative;
      min-height: 430px;
      border-radius: 0 0 24px 24px;
      overflow: hidden;
      background: #111;
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: 0 22px 70px rgba(0,0,0,.42);
    }

    .hero img {
      position: absolute;
      inset: 0;
      height: 100%;
      object-fit: cover;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.12), rgba(0,0,0,.38) 44%, rgba(0,0,0,.93)),
        linear-gradient(90deg, rgba(0,0,0,.56), transparent 62%);
    }

    .hero-copy {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 20px;
      z-index: 2;
    }

    .eyebrow {
      display: inline-flex;
      min-height: 26px;
      align-items: center;
      border-radius: 999px;
      padding: 0 10px;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.16);
      color: #f4f4f7;
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .hero h1 {
      margin-top: 12px;
      max-width: 560px;
      font-size: clamp(30px, 8.6vw, 54px);
      line-height: .97;
      font-weight: 950;
      letter-spacing: 0;
      text-wrap: balance;
    }

    .hero p {
      margin-top: 14px;
      max-width: 560px;
      color: #ededf3;
      font-size: clamp(14px, 3.6vw, 16px);
      font-weight: 650;
    }

    .intro {
      margin-top: 14px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.035));
      border-radius: 16px;
      padding: 15px;
    }

    .intro p {
      color: var(--soft);
      font-size: 14px;
      margin-top: 10px;
    }

    .intro p:first-child { margin-top: 0; }

    .section-title {
      margin: 24px 0 12px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 14px;
    }

    .section-title h2 {
      font-size: 21px;
      font-weight: 950;
      letter-spacing: 0;
    }

    .section-title span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .08em;
      white-space: nowrap;
    }

    .list {
      display: grid;
      gap: 16px;
    }

    .bot-card {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 17px;
      background: var(--panel);
      box-shadow: 0 18px 54px rgba(0,0,0,.24);
    }

    .bot-banner {
      position: relative;
      aspect-ratio: 16 / 8.35;
      background: #141419;
      overflow: hidden;
    }

    .bot-banner img {
      height: 100%;
      object-fit: cover;
      transition: transform .28s ease;
    }

    .bot-banner::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 46%, rgba(0,0,0,.86));
    }

    .bot-card:active .bot-banner img { transform: scale(1.015); }

    .bot-body {
      padding: 15px;
    }

    .meta {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .bot-card h3 {
      margin-top: 8px;
      font-size: clamp(24px, 6.3vw, 36px);
      line-height: 1.02;
      font-weight: 950;
      letter-spacing: 0;
    }

    .bot-card p {
      margin-top: 10px;
      color: var(--soft);
      font-size: 14.5px;
      line-height: 1.53;
    }

    .actions {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .primary {
      min-height: 42px;
      border-radius: 11px;
      background: var(--brand);
      color: #fff;
      padding: 0 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-size: 14px;
      font-weight: 900;
      min-width: 150px;
    }

    .secondary {
      min-height: 46px;
      border-radius: 12px;
      border: 1px solid var(--line-2);
      background: rgba(255,255,255,.05);
      color: #fff;
      padding: 0 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-weight: 850;
    }

    .closing {
      margin-top: 20px;
      border-radius: 20px;
      border: 1px solid rgba(255,61,52,.3);
      background: linear-gradient(145deg, rgba(255,61,52,.16), rgba(255,255,255,.04));
      padding: 20px;
    }

    .closing h2 {
      font-size: 26px;
      line-height: 1.05;
      font-weight: 950;
    }

    .closing p {
      margin-top: 12px;
      color: var(--soft);
      font-size: 15px;
    }

    .footer {
      margin: 18px 0 0;
      color: var(--muted);
      text-align: center;
      font-size: 12px;
    }

    @media (min-width: 760px) {
      .page { width: min(100% - 40px, 780px); }
      .hero { min-height: 500px; }
      .hero-copy { left: 26px; right: 26px; bottom: 28px; }
      .intro { padding: 24px; }
      .bot-body { padding: 18px; }
      .bot-card:hover { border-color: var(--line-2); }
      .bot-card:hover .bot-banner img { transform: scale(1.025); }
    }

    @media (max-width: 520px) {
      .page { width: calc(100% - 18px); padding-top: calc(8px + var(--safe-top)); }
      .language-button { min-width: 84px; }
      .hero { min-height: 420px; border-radius: 0 0 18px 18px; }
      .hero-copy { left: 16px; right: 16px; bottom: 18px; }
      .intro { padding: 16px; }
      .section-title { align-items: flex-start; flex-direction: column; gap: 4px; }
      .bot-body { padding: 14px; }
      .bot-card p { font-size: 14px; }
      .primary, .secondary { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="topbar">
      <div class="language" id="language">
        <button class="language-button" type="button" id="languageButton" aria-haspopup="true" aria-expanded="false"></button>
        <div class="language-menu" id="languageMenu" role="menu"></div>
      </div>
    </header>

    <section class="hero">
      <img src="https://photo.chelpbot.me/AgACAgEAAxkBa-uZq2n-Yf_8WAeP4vx8bAsIcwABppWl4wACwAtrGxRW6UZIISRg5avbBQEAAwIAA3kAAzsE/photo.jpg" alt="" />
      <div class="hero-copy">
        <span class="eyebrow" data-i18n="hero.kicker"></span>
        <h1 data-i18n="hero.title"></h1>
        <p data-i18n="hero.body"></p>
      </div>
    </section>

    <section class="intro" id="intro"></section>

    <div class="section-title">
      <h2 data-i18n="section.title"></h2>
      <span data-i18n="section.count"></span>
    </div>

    <section class="list" id="botsList" aria-label="Bots Baltigo"></section>

    <section class="closing">
      <h2 data-i18n="closing.title"></h2>
      <p data-i18n="closing.body"></p>
      <div class="actions">
        <a class="secondary" href="https://t.me/QG_BALTIGO" data-link="https://t.me/QG_BALTIGO" data-i18n="closing.cta"></a>
      </div>
    </section>

    <p class="footer">Baltigo</p>
  </main>

  <script>
    const tg = window.Telegram && window.Telegram.WebApp;
    try {
      tg?.ready();
      tg?.expand();
      tg?.setHeaderColor?.("#070708");
      tg?.setBackgroundColor?.("#070708");

    const languages = {
      pt: { flag: "🇧🇷", label: "PT" },
      en: { flag: "🇺🇸", label: "EN" },
      es: { flag: "🇪🇸", label: "ES" }
    };

    const copy = {
      pt: {
        "hero.kicker": "Ecossistema Baltigo",

        ],
        "section.title": "Puertas de entrada",
        "section.count": "8 experiencias",

        "card.channel": "Ver comunidad",
        "closing.title": "Siempre hay más por descubrir.",
        "closing.body": "No importa si quieres ver, leer, escuchar, jugar o coleccionar. El ecosistema Baltigo fue creado para mantener siempre una nueva puerta abierta.",
        "closing.cta": "Seguir novedades en QG"
      }

    const bots = [
      {
        type: "anime",
        name: "Animes Baltigo",
        handle: "@AnimesBaltigo_Bot",
        url: "https://t.me/AnimesBaltigo_Bot",
        image: "https://photo.chelpbot.me/AgACAgEAAxkBa-umTGn-YrmQP3FG4W-sdiMpK1aRUu7zAALbC2sb2U34R432wPHP8OrAAQADAgADeQADOwQ/photo.jpg",
        desc: {

        }
      },
      {
        type: "manga",
        name: "Mangás Baltigo",
        handle: "@MangasBaltigo_Bot",

        image: "https://photo.chelpbot.me/AgACAgEAAxkBa-uhxmn-Ynl49i4sc-QGdecUy6MivtqbAAJlDGsbr6GIR8U7RAEQqdGuAQADAgADeQADOwQ/photo.jpg",
        desc: {

        desc: {

        desc: {

      },
      {

        name: "Baixa Aqui",

        desc: {
          pt: "Uma ferramenta prática para enviar links, processar arquivos, baixar mídias e organizar tarefas direto pelo Telegram, com foco em agilidade e controle.",
          en: "A practical tool for sending links, processing files, downloading media and organizing tasks directly through Telegram, focused on speed and control.",

        }
      }

    const state = {
      lang: localStorage.getItem("baltigo:ecosystem:lang") || "pt"
    };

    const languageRoot = document.getElementById("language");
    const languageButton = document.getElementById("languageButton");
    const languageMenu = document.getElementById("languageMenu");
    const intro = document.getElementById("intro");
    const botsList = document.getElementById("botsList");

    function t(key) {
      return copy[state.lang][key] || copy.pt[key] || key;
    }

    function openTelegram(url) {
      try {
        if (tg?.openTelegramLink) {
          tg.openTelegramLink(url);
          return;
        }
      } catch (error) {}
      window.open(url, "_blank", "noopener");
    }

    function renderLanguage() {
      const current = languages[state.lang] || languages.pt;
      languageButton.innerHTML = `<span>${current.flag}</span><span>${current.label}</span>`;
      languageButton.setAttribute("aria-expanded", languageRoot.classList.contains("open") ? "true" : "false");
      languageMenu.innerHTML = Object.entries(languages).map(([code, item]) => `
        <button type="button" class="${code === state.lang ? "active" : ""}" data-lang="${code}">
          ${item.flag} ${item.label}
        </button>
      `).join("");
    }

    function renderText() {
      document.documentElement.lang = state.lang === "pt" ? "pt-BR" : state.lang;
      document.querySelectorAll("[data-i18n]").forEach((node) => {
        node.textContent = t(node.dataset.i18n);
      });
      intro.innerHTML = copy[state.lang].intro.map((line) => `<p>${line}</p>`).join("");
    }

    function renderBots() {
      botsList.innerHTML = bots.map((bot, index) => `
        <article class="bot-card">
          <div class="bot-banner">
            <img src="${bot.image}" alt="${bot.name}" loading="${index < 2 ? "eager" : "lazy"}">
          </div>
          <div class="bot-body">
            <div class="meta">
              <span>${bot.type}</span>
            </div>
            <h3>${bot.name}</h3>
            <p>${bot.desc[state.lang] || bot.desc.pt}</p>
            <div class="actions">
              <a class="primary" href="${bot.url}" data-link="${bot.url}">${t("card.open")}</a>
            </div>
          </div>
        </article>
      `).join("");
    }

    function render() {
      renderLanguage();
      renderText();
      renderBots();
    }

    languageButton.addEventListener("click", () => {
      languageRoot.classList.toggle("open");
      languageButton.setAttribute("aria-expanded", languageRoot.classList.contains("open") ? "true" : "false");
    });

    languageMenu.addEventListener("click", (event) => {
      const button = event.target.closest("[data-lang]");
      if (!button) return;
      state.lang = button.dataset.lang;
      localStorage.setItem("baltigo:ecosystem:lang", state.lang);
      languageRoot.classList.remove("open");
      render();
    });

    document.addEventListener("click", (event) => {
      if (!languageRoot.contains(event.target)) {
        languageRoot.classList.remove("open");
        languageButton.setAttribute("aria-expanded", "false");
      }
      const link = event.target.closest("[data-link]");
      if (!link) return;
      event.preventDefault();
      openTelegram(link.dataset.link);
    });

    render();
  </script>
</body>
</html>
